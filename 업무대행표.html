<body>

<header class="app-header">
  <div><h1>JK기업영업2팀 업무(자동누적)대행표</h1><p>11명 팀원 · 최대 7명 동시 휴가 · 연속 시간 블록 배정 &nbsp;<span id="fbStatus" style="font-size:11px;opacity:.8">⏳ 연결 중...</span></p></div>
  <div class="header-btns">
    <button class="btn btn-share" onclick="openShareModal()">🔗 공유 링크</button>
    <button class="btn btn-hdr" onclick="window.print()">🖨 인쇄</button>
    <button class="btn btn-hdr btn-reset" onclick="confirmReset()">↺ 초기화</button>
    <a href="http://isup.jobkorea.co.kr/isjk/agentConfig.do" target="_blank" class="btn btn-hdr">📞 착신</a>
  </div>
</header>

<div class="container">

const SLOTS={'연차휴가':[9,10,11,13,14,15,16,17],'오전연차':[9,10,11,13],'오후연차':[14,15,16,17],'오전반반차':[9,10],'오후반반차':[16,17],'건강검진':[9,10,11,13,14]};
const BADGE={'연차휴가':'b-red','오전연차':'b-blue','오후연차':'b-orange','오전반반차':'b-green','오후반반차':'b-purple','건강검진':'b-teal'};
const SK='wca_v3', IK='wca_imp', FK='wca_fd', VK='wca_vac';
let _lastCov=null;

// ── Firebase 실시간 동기화 ────────────────────────────

  appId:             "1:6286461066:web:67f2db0b5089ff30838573"
};
const FB_READY=!FB_CONFIG.apiKey.startsWith('REPLACE');
let _db=null,_dataRef=null,_fdRef=null,_vacRef=null;

// Firebase 원격 변경 시 현재 탭 재렌더
function _rerenderActive(data){
  renderTeamChips(null);
  const tabId=(document.querySelector('.tab-pane.active')||{}).id||'';
  if(tabId==='tab-cum')rerenderCum(data,null);

  else if(tabId==='tab-fd')renderFamilyDay();

// ── Consecutive block algorithm ───────────────────────
function groupConsecutive(slots){
  if(!slots.length)return[];
  const g=[];let c=[slots[0]];
  for(let i=1;i<slots.length;i++){
    if(slots[i]===slots[i-1]+1)c.push(slots[i]);
    else{g.push(c);c=[slots[i]];}
  }
  g.push(c);return g;
}

function blockLabel(seq){
  const s=seq[0],e=seq[seq.length-1]+1;
  return `${String(s).padStart(2,'0')}:00 - ${String(e).padStart(2,'0')}:00`;
}

function calcCoverage(absences,cumHours){
  const absentSet=new Set(absences.map(a=>a.name));
  const avail=MEMBERS.filter(m=>!absentSet.has(m));
  const sess=Object.fromEntries(MEMBERS.map(m=>[m,0]));
  const busyAt=Object.fromEntries(avail.map(m=>[m,new Set()]));
  const result=[];

  function sortH(arr){
    return[...arr].sort((a,b)=>{
      const ha=(cumHours[a]||0)+sess[a],hb=(cumHours[b]||0)+sess[b];
      return ha!==hb?ha-hb:MEMBERS.indexOf(a)-MEMBERS.indexOf(b);
    });
  }

  function assignSeq(seq,absence){
    // Try to give the whole consecutive block to one person
    const free=sortH(avail.filter(m=>seq.every(s=>!busyAt[m].has(s))));
    if(free.length>0){
      const who=free[0];
      result.push({slots:seq,slotLabel:blockLabel(seq),absentee:absence.name,leaveType:absence.leaveType,assignee:who,hours:seq.length});
      seq.forEach(s=>busyAt[who].add(s));
      sess[who]+=seq.length;
      return;
    }
    // Can't give full block to one person — split in half and recurse
    if(seq.length===1){
      const any=sortH(avail.filter(m=>!busyAt[m].has(seq[0])));
      if(any.length>0){
        const who=any[0];
        result.push({slots:seq,slotLabel:blockLabel(seq),absentee:absence.name,leaveType:absence.leaveType,assignee:who,hours:1});
        busyAt[who].add(seq[0]);sess[who]++;
      }
      return;
    }
    const mid=Math.ceil(seq.length/2);
    assignSeq(seq.slice(0,mid),absence);
    assignSeq(seq.slice(mid),absence);
  }

  for(const ab of absences){
    const seqs=groupConsecutive(SLOTS[ab.leaveType]);
    for(const seq of seqs)assignSeq(seq,ab);
  }

  // Redistribute: ensure every available member gets at least one assignment
  // by splitting the largest remaining blocks for unassigned members
  const assigned=new Set(result.map(r=>r.assignee));
  const needWork=sortH(avail.filter(m=>!assigned.has(m)));
  for(const who of needWork){
    const cand=result.map((r,i)=>({i,len:r.slots.length})).filter(x=>x.len>1).sort((a,b)=>b.len-a.len);
    if(!cand.length)break;
    const {i}=cand[0];
    const t=result[i];
    const mid=Math.ceil(t.slots.length/2);
    const first=t.slots.slice(0,mid),second=t.slots.slice(mid);
    result[i]={...t,slots:first,slotLabel:blockLabel(first),hours:first.length};
    result.push({slots:second,slotLabel:blockLabel(second),absentee:t.absentee,leaveType:t.leaveType,assignee:who,hours:second.length});
    sess[t.assignee]-=second.length;
    sess[who]=(sess[who]||0)+second.length;
  }

  // Sort by start slot, then by absentee order
  result.sort((a,b)=>{
    const sa=a.slots[0],sb=b.slots[0];
    if(sa!==sb)return sa-sb;
    return absences.findIndex(x=>x.name===a.absentee)-absences.findIndex(x=>x.name===b.absentee);
  });
  return{result,sess};
}

// Backward-compatible: old entries have {slot:N}, new have {slots:[...],hours:N}
function sessFromAssignments(assignments){
  const s=Object.fromEntries(MEMBERS.map(m=>[m,0]));
  for(const a of assignments){
    const h=a.hours!=null?a.hours:(a.slots?a.slots.length:1);
    s[a.assignee]=(s[a.assignee]||0)+h;
  }
  return s;
}
function startSlotOf(a){return a.slots?a.slots[0]:(a.slot??0);}

// ── Render ────────────────────────────────────────────
function fmtDate(ds){const d=new Date(ds+'T00:00:00');return`${d.getFullYear()}년 ${d.getMonth()+1}월 ${d.getDate()}일 (${DAYS[d.getDay()]})`;}

function buildRows(assignments){
  if(!assignments.length)return'';
  let rows='',prevStart=null;
  for(const a of assignments){
    const ss=startSlotOf(a);
    const sep=(prevStart!==null&&ss!==prevStart)?' class="grp-sep"':'';
    rows+=`<tr${sep}><td><strong>${a.slotLabel}</strong></td><td><strong>${a.absentee}</strong></td><td><span class="badge ${BADGE[a.leaveType]}">${a.leaveType}</span></td><td><strong style="color:#1e3a5f">${a.assignee}</strong></td></tr>`;
    prevStart=ss;
  }
  return rows;
}

function renderCoverage(date,absences,assignments){
  if(!assignments||!assignments.length)
    return`<div class="banner"><div><div class="banner-date">${fmtDate(date)}</div><div class="banner-sub">업무대행 일정</div></div></div><p style="color:#94a3b8;text-align:center;padding:30px">배정할 업무가 없습니다.</p>`;
  const summ={};
  for(const a of assignments){const h=a.hours??a.slots?.length??1;summ[a.assignee]=(summ[a.assignee]||0)+h;}
  const summChips=Object.entries(summ).map(([n,h])=>`<span class="s-chip">${n} <span style="color:#2e86c1">+${h}h</span></span>`).join('');
  return`<div class="banner"><div><div class="banner-date">${fmtDate(date)}</div><div class="banner-sub">업무대행 일정</div></div><div class="chips">${absences.map(a=>`<span class="chip">${a.name}·${a.leaveType}</span><button class="chip-copy" onclick="copyChipSlack('${a.name}')">📋 복사</button><button class="chip-copy" onclick="delCovAbsentee('${a.name}')">🗑 삭제</button>`).join('')}<button class="chip-copy" onclick="editCovEntry()">✏️ 수정</button></div></div>
  <div class="tw"><table><thead><tr><th style="width:160px">시간대 (연속 블록)</th><th>휴가자</th><th>휴가 종류</th><th>대행자</th></tr></thead><tbody>${buildRows(assignments)}</tbody></table></div>
  <div class="summary-box"><h4>이번 배정 요약</h4><div class="summary-chips">${summChips}</div></div>`;
}

function buildMonthlyData(history){
  const months={};
  for(const entry of history){
    const ym=entry.date.slice(0,7);
    if(!months[ym])months[ym]=Object.fromEntries(MEMBERS.map(m=>[m,0]));
    for(const a of entry.assignments){
      const h=a.hours??a.slots?.length??1;
      months[ym][a.assignee]=(months[ym][a.assignee]||0)+h;
    }
  }
  return months;
}

// monthHours: 선택 월 실적, cumHours: 누적 잔액(음수 포함)
function renderCumulative(monthHours,sessHours,history,settled,adjMap,cumHours){
  if(!settled)settled=[];
  if(!cumHours)cumHours=monthHours;
  const vals=MEMBERS.map(m=>monthHours[m]??0);
  const absMax=Math.max(...vals.map(v=>Math.abs(v)),1);
  const maxM=MEMBERS[vals.indexOf(Math.max(...vals))];
  const minM=MEMBERS[vals.indexOf(Math.min(...vals))];
  const avg=(vals.reduce((s,v)=>s+v,0)/MEMBERS.length).toFixed(1);
  const sorted=[...MEMBERS].sort((a,b)=>(monthHours[a]??0)-(monthHours[b]??0));
  const cards=sorted.map(m=>{
    const h=monthHours[m]??0,nh=sessHours?(sessHours[m]||0):0;
    const isNeg=h<0;
    const pct=absMax>0?Math.min(100,Math.round(Math.abs(h)/absMax*100)):0;
    const adj=adjMap?(adjMap[m]||0):0;
    let cls='mc';
    if(nh>0)cls+=' hl';
    else if(h===Math.max(...vals)&&h>0)cls+=' top';
    else if(h===Math.min(...vals)&&vals.some(v=>v>0))cls+=' low';
    const adjBadge=adj!==0?`<div class="mc-new" style="${adj>0?'background:#d1fae5;color:#065f46':'background:#fee2e2;color:#b91c1c'}">${adj>0?'+':''}${adj}h</div>`:'';
    const hBarColor=isNeg?'background:linear-gradient(90deg,#ef4444,#fca5a5)':'background:linear-gradient(90deg,#1a6ec4,#60a5fa)';
    return`<div class="${cls}"><div class="mc-name">${m}</div><div><span class="mc-hours" style="${isNeg?'color:#dc2626':''}">${h}</span><span class="mc-unit">시간</span></div>${nh>0?`<div class="mc-new">+${nh}h 추가</div>`:''}${adjBadge}<div class="hbar"><div class="hbar-f" style="width:${pct}%;${hBarColor}"></div></div></div>`;
  }).join('');

  // 월별 현황 테이블
  const mdata=buildMonthlyData(history||[]);
  const mkeys=Object.keys(mdata).sort().reverse();
  let monthly='';
  if(mkeys.length>0){
    const mavg={};
    mkeys.forEach(ym=>{
      const t=MEMBERS.reduce((s,m)=>s+(mdata[ym][m]||0),0);
      mavg[ym]=t/MEMBERS.length;
    });
    const hdr=mkeys.map(ym=>{
      const[y,m]=ym.split('-');
      const isSettled=settled.includes(ym);
      const badge=isSettled
        ?`<span style="display:inline-block;margin-top:3px;font-size:10px;color:#16a34a;font-weight:700">✅ 정산완료</span>`
        :`<button onclick="settleMonth('${ym}')" style="display:inline-block;margin-top:3px;font-size:10px;padding:1px 6px;border:1.5px solid #f59e0b;background:#fffbeb;color:#92400e;border-radius:4px;cursor:pointer;font-family:inherit;font-weight:700">⚖️ 정산</button>`;
      return`<th style="text-align:center;white-space:nowrap">${y}년 ${parseInt(m)}월<br><span style="font-size:10px;font-weight:400;opacity:.8">평균 ${mavg[ym].toFixed(1)}h</span><br>${badge}</th>`;
    }).join('');
    const rows=sorted.map(member=>{
      const cells=mkeys.map(ym=>{
        const h=mdata[ym][member]||0;
        const excess=h-mavg[ym];
        const isAbove=excess>0.1;
        const isBelow=excess<-0.1;
        const exColor=isAbove?'#059669':isBelow?'#dc2626':'';
        const bg=isAbove?'background:#f0fdf4':isBelow?'background:#fff5f5':'';
        const exTag=(isAbove||isBelow)
          ?`<br><span style="font-size:10px;font-weight:700;color:${exColor}">${isAbove?'+':''}${excess.toFixed(1)}h</span>`
          :'';
        const hDisp=h>0?`<strong style="color:#1e3a5f">${h}h</strong>`:`<span style="color:#cbd5e1">-</span>`;
        return`<td style="text-align:center;${bg}">${hDisp}${exTag}</td>`;
      }).join('');
      const runH=cumHours[member]??0;
      const runC=runH<0?'#dc2626':runH>0?'#2e86c1':'#94a3b8';
      return`<tr><td><strong>${member}</strong></td>${cells}<td style="text-align:center;font-weight:800;color:${runC}">${runH>0?'+':''}${runH}h</td></tr>`;
    }).join('');
    const totCells=mkeys.map(ym=>{
      const t=MEMBERS.reduce((s,m)=>s+(mdata[ym][m]||0),0);
      return`<td style="text-align:center;font-weight:700;color:#374151;background:#f0f4f8">${t}h</td>`;
    }).join('');
    const grand=MEMBERS.reduce((s,m)=>s+(cumHours[m]??0),0);
    const grandC=grand<0?'#dc2626':grand>0?'#1e3a5f':'#94a3b8';
    monthly=`<div style="margin-top:22px;padding-top:18px;border-top:2px solid #eef2f7">
      <div style="font-size:13px;font-weight:700;color:#1e3a5f;margin-bottom:6px;display:flex;align-items:center;gap:6px"><span class="ctbar"></span>월별 대행 시간 현황</div>
      <div style="font-size:11px;color:#7c8fa4;margin-bottom:10px">⚖️ <strong>정산</strong>: 평균 초과 → <span style="color:#059669;font-weight:700">+이월</span> (덜 채워도 됨) · 평균 부족 → <span style="color:#dc2626;font-weight:700">-이월</span> (더 채워야 함)</div>
      <div class="tw"><table>
        <thead><tr><th>이름</th>${hdr}<th style="text-align:center;background:#2e5a8e">누적 잔액</th></tr></thead>
        <tbody>${rows}<tr><td style="font-weight:700;color:#5a6a7e;background:#f0f4f8">월 합계</td>${totCells}<td style="text-align:center;font-weight:800;color:${grandC};background:#e0e8f4">${grand>0?'+':''}${grand}h</td></tr></tbody>
      </table></div>
    </div>`;
  }

  const noticeBox=`<div style="background:#f0f7ff;border:1.5px solid #bfdbfe;border-radius:10px;padding:12px 16px;margin-bottom:14px;font-size:12px;color:#374151;line-height:1.8">
    <div style="font-weight:700;color:#1e3a5f;margin-bottom:6px">[${_cm+1}월 팀원 업무 현황 및 누적 현황 안내]</div>
    <div>📋 평균 업무대행 수: <strong>${avg}h</strong></div>
    <div>📌 수치 표기 안내</div>
    <div style="margin-left:14px;color:#dc2626;font-weight:600">➖ (빨간색 마이너스): 팀 평균 미달</div>
    <div style="margin-left:14px;color:#059669;font-weight:600">➕ (플러스): 팀 평균 이상 수행</div>
  </div>`;
  return noticeBox+`<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:4px">
    <div><span style="font-size:13px;font-weight:700;color:#5a6a7e">${_cm+1}월 대행 시간 (적은 순)</span><div style="font-size:10px;color:#94a3b8;margin-top:2px">달력 ◀▶로 월 변경 · 하단 테이블에서 누적 잔액(+/−) 확인</div></div>
    <button class="btn btn-excel" onclick="downloadExcel()">📥 엑셀 다운로드</button>
  </div>
  <div class="stat-row">
    <div class="stat-box" style="background:#eff6ff;border:1.5px solid #bfdbfe"><div class="s-label" style="color:#60a5fa">가장 많이 대행</div><div class="s-name">${maxM}</div><div class="s-val" style="color:#2e86c1">${monthHours[maxM]??0}h</div></div>
    <div class="stat-box" style="background:#ecfdf5;border:1.5px solid #a7f3d0"><div class="s-label" style="color:#34d399">가장 적게 대행</div><div class="s-name">${minM}</div><div class="s-val" style="color:#059669">${monthHours[minM]??0}h</div></div>
    <div class="stat-box" style="background:#faf5ff;border:1.5px solid #e9d5ff"><div class="s-label" style="color:#a78bfa">월 평균</div><div class="s-name" style="font-size:11px;margin-bottom:2px">평균</div><div class="s-val" style="color:#7c3aed">${avg}h</div></div>
  </div>
  <div class="members-grid">${cards}</div>${monthly}`;
}

// 누적 탭 재렌더 헬퍼
function rerenderCum(data,sess){
  const curYM=`${_cy}-${String(_cm+1).padStart(2,'0')}`;
  const monthH=(buildMonthlyData(data.history||[]))[curYM]||{};
  const mTotal=MEMBERS.reduce((s,m)=>s+(monthH[m]||0),0);
  const carryMap=(data.settleAdjustments||{})[curYM]||{};
  let devMap;
  if(mTotal>0){
    // 이월값 + 이번달 편차
    const mAvg=mTotal/MEMBERS.length;
    devMap=Object.fromEntries(MEMBERS.map(m=>[m,Math.round((monthH[m]||0)-mAvg)+(carryMap[m]??0)]));
  }else{
    // 이번달 실적 없으면 이월값만
    devMap=carryMap;
  }
  document.getElementById('cumContent').innerHTML=renderCumulative(monthH,sess,data.history,data.settledMonths||[],devMap,data.hours);
}

function renderHistory(history){
  if(!history.length)return`<div class="empty"><svg width="48" height="48" viewBox="0 0 48 48" fill="none" style="opacity:.3;margin-bottom:10px"><circle cx="24" cy="24" r="19" stroke="#94a3b8" stroke-width="2.5"/><line x1="24" y1="14" x2="24" y2="24" stroke="#94a3b8" stroke-width="2.5" stroke-linecap="round"/><circle cx="24" cy="31" r="2" fill="#94a3b8"/></svg><p>이력이 없습니다</p><small>업무대행표를 생성하면 이력이 쌓입니다</small></div>`;
  const sorted=[...history].sort((a,b)=>b.date.localeCompare(a.date));
  const groups={};
  for(const e of sorted){const ym=e.date.slice(0,7);if(!groups[ym])groups[ym]=[];groups[ym].push(e);}
  const curYM=`${_cy}-${String(_cm+1).padStart(2,'0')}`;
  return Object.keys(groups).sort().reverse().map(ym=>{
    const entries=groups[ym];
    const[y,mo]=ym.split('-');
    const folderH=entries.reduce((s,e)=>s+e.assignments.reduce((ss,a)=>ss+(a.hours??a.slots?.length??1),0),0);
    const isOpen=ym===curYM;
    const entriesHtml=entries.map(e=>{
      const meta=e.absences.map(a=>`${a.name}(${a.leaveType})`).join(', ');
      const eH=e.assignments.reduce((s,a)=>s+(a.hours??a.slots?.length??1),0);
      return`<div class="hist-entry" id="he-${e.id}">
        <div class="hist-hdr" onclick="toggleHist('${e.id}')">
          <div><div class="hist-date">${fmtDate(e.date)}</div><div class="hist-meta">${meta} · 총 ${eH}시간</div></div>
          <div class="hist-acts">
            <button class="btn btn-edit" onclick="event.stopPropagation();editHist('${e.id}')">✏️ 수정</button>
            <button class="btn btn-del" onclick="event.stopPropagation();delHist('${e.id}')">🗑 삭제</button>
            <button class="btn btn-clip" onclick="event.stopPropagation();copyHistEntry('${e.id}')">📋 복사</button>

            <span class="hist-chev">▼</span>
          </div>
        </div>
        <div class="hist-body" id="hb-${e.id}">
          <div class="tw"><table><thead><tr><th style="width:160px">시간대</th><th>휴가자</th><th>휴가 종류</th><th>대행자</th></tr></thead><tbody>${buildRows(e.assignments)}</tbody></table></div>
        </div>
      </div>`;
    }).join('');
    return`<div class="hist-month-folder" id="hf-${ym}">
      <div class="hist-month-hdr" onclick="toggleHistMonth('${ym}')">
        <div style="display:flex;align-items:center;gap:8px">
          <span id="hfi-${ym}" style="font-size:16px">${isOpen?'📂':'📁'}</span>
          <span style="font-weight:800;font-size:14px">${y}년 ${parseInt(mo)}월</span>
          <span style="font-size:11px;background:rgba(255,255,255,.2);border-radius:20px;padding:2px 9px;font-weight:700">${entries.length}건</span>
          <span style="font-size:11px;background:rgba(100,210,140,.25);color:#a7f3d0;border-radius:20px;padding:2px 9px;font-weight:700">총 ${folderH}h</span>
        </div>
        <span id="hfc-${ym}" style="font-size:13px;opacity:.7">${isOpen?'▲':'▼'}</span>
      </div>
      <div class="hist-month-body" id="hmb-${ym}" style="${isOpen?'':'display:none'}">${entriesHtml}</div>
    </div>`;
  }).join('');
}

function toggleHistMonth(ym){
  const body=document.getElementById(`hmb-${ym}`);
  const icon=document.getElementById(`hfi-${ym}`);
  const chev=document.getElementById(`hfc-${ym}`);
  const isOpen=body.style.display!=='none';
  body.style.display=isOpen?'none':'block';
  if(icon)icon.textContent=isOpen?'📁':'📂';
  if(chev)chev.textContent=isOpen?'▼':'▲';
}

function renderTeamChips(sessHours){
  const d=load();
  const curYM=`${_cy}-${String(_cm+1).padStart(2,'0')}`;
  const mh=(buildMonthlyData(d.history||[]))[curYM]||{};
  const titleEl=document.getElementById('teamChipsTitle');
  if(titleEl)titleEl.textContent=`팀원 ${_cm+1}월 현황`;
  const monthTotal=MEMBERS.reduce((s,m)=>s+(mh[m]||0),0);
  const hasData=monthTotal>0;
  const monthAvg=hasData?monthTotal/MEMBERS.length:0;
  const avgEl=document.getElementById('teamChipsAvg');
  if(avgEl)avgEl.innerHTML=`📋 평균 업무대행 수: <strong>${monthAvg.toFixed(1)}h</strong> &nbsp;·&nbsp; <span style="color:#dc2626;font-weight:600">➖ 팀 평균 미달</span> &nbsp; <span style="color:#059669;font-weight:600">➕ 팀 평균 이상</span>`;
  const settleAdj=(d.settleAdjustments||{})[curYM]||{};
  document.getElementById('teamChips').innerHTML=MEMBERS.map(m=>{
    const h=mh[m]||0,nh=sessHours?(sessHours[m]||0):0;
    // 이월값 + 이번달 편차 (이월값은 항상 합산)
    const carry=settleAdj[m]??0;
    const val=carry+(hasData?Math.round(h-monthAvg):0);
    const badge=val!==0
      ?`<span style="font-size:9px;font-weight:700;${val>0?'color:#059669;background:#d1fae5':'color:#dc2626;background:#fee2e2'};border-radius:10px;padding:1px 6px;margin-left:3px;white-space:nowrap">${val>0?'+':''}${val}h</span>`
      :'';
    const borderStyle=val<0?'border-color:#fca5a5':val>0?'border-color:#86efac':'';
    return`<span class="t-chip${nh>0?' active':''}" style="${borderStyle}">${m} <strong>${h}h</strong>${badge}</span>`;
  }).join('');
}

// ── Selects ───────────────────────────────────────────
function refreshSelects(prefix){
  const sel=[1,2,3,4].map(i=>({id:`${prefix}${i}`,val:document.getElementById(`${prefix}${i}`).value}));
  for(let i=0;i<4;i++){
    const others=sel.filter((_,j)=>j!==i).map(s=>s.val).filter(Boolean);
    const cur=sel[i].val,el=document.getElementById(sel[i].id);
    el.innerHTML='<option value="">선택 안함</option>';
    MEMBERS.forEach(m=>{if(!others.includes(m))el.innerHTML+=`<option value="${m}"${cur===m?' selected':''}>${m}</option>`;});
  }
}

function clearAbsenteeForm(){
  for(let i=1;i<=4;i++){document.getElementById(`n${i}`).value='';document.getElementById(`t${i}`).value='';document.getElementById(`t${i}`).disabled=true;}
  refreshSelects('n');
}

function generate(){
  const date=document.getElementById('dateInput').value;
  if(!date){alert('날짜를 선택해주세요.');return;}
  const absences=[];
  for(let i=1;i<=4;i++){
    const name=document.getElementById(`n${i}`).value,type=document.getElementById(`t${i}`).value;
    if(name&&type)absences.push({name,leaveType:type});
    else if(name&&!type){alert(`휴가자 ${i}의 휴가 종류를 선택해주세요.`);return;}
  }
  if(!absences.length){alert('최소 1명의 휴가자와 휴가 종류를 선택해주세요.');return;}
  const data=load();

  // 월 변경 감지 → 이번달 누적 자동 초기화 (이전 월 데이터는 history에 유지)
  const newMonth=date.slice(0,7);
  if(data.currentMonth&&data.currentMonth<newMonth){
    const wasSettled=(data.settledMonths||[]).includes(data.currentMonth);
    data.hours=wasSettled
      ?data.hours  // 정산 완료 월: 초과분만 이월
      :Object.fromEntries(MEMBERS.map(m=>[m,0]));  // 미정산: 완전 초기화
    data.currentMonth=newMonth;
    save(data);
    showToast(`${parseInt(newMonth.slice(5,7))}월 시작 — 누적 ${wasSettled?'정산 결과 이월':'초기화'}됨`);
  }else if(!data.currentMonth){
    data.currentMonth=newMonth;
    save(data);
  }

  const ei=data.history.findIndex(h=>h.date===date);
  if(ei!==-1){
    if(!confirm(`${fmtDate(date)}의 대행표가 이미 존재합니다. 교체하시겠습니까?`))return;
    const os=sessFromAssignments(data.history[ei].assignments);
    for(const m of MEMBERS)data.hours[m]=(data.hours[m]||0)-(os[m]||0);
    data.history.splice(ei,1);
  }
  const{result,sess}=calcCoverage(absences,data.hours);
  for(const m of MEMBERS)data.hours[m]=(data.hours[m]||0)+(sess[m]||0);
  const newId=`${date}-${Date.now()}`;
  data.history.push({id:newId,date,absences,assignments:result});
  save(data);
  _lastCov={date,absences,assignments:result,histId:newId};
  document.getElementById('covContent').innerHTML=renderCoverage(date,absences,result);
  rerenderCum(data,sess);
  document.getElementById('histContent').innerHTML=renderHistory(data.history);
  renderTeamChips(sess);
  showTab('cov');
}

// ── Compression ───────────────────────────────────────
async function compress(str){
  if(typeof CompressionStream==='undefined'){
    return btoa(unescape(encodeURIComponent(str))).replace(/\+/g,'-').replace(/\//g,'_').replace(/=/g,'');
  }
  const cs=new CompressionStream('deflate-raw');
  const w=cs.writable.getWriter();
  w.write(new TextEncoder().encode(str));w.close();
  const buf=await new Response(cs.readable).arrayBuffer();
  return btoa(String.fromCharCode(...new Uint8Array(buf))).replace(/\+/g,'-').replace(/\//g,'_').replace(/=/g,'');
}

async function decompress(encoded){
  const b64=encoded.replace(/-/g,'+').replace(/_/g,'/');
  const pad=(4-b64.length%4)%4;
  const full=b64+'='.repeat(pad);
  const bytes=Uint8Array.from(atob(full),c=>c.charCodeAt(0));
  if(typeof DecompressionStream==='undefined'){
    return decodeURIComponent(escape(atob(full)));
  }
  try{
    const ds=new DecompressionStream('deflate-raw');
    const w=ds.writable.getWriter();w.write(bytes);w.close();
    return await new Response(ds.readable).text();
  }catch(e){
    return decodeURIComponent(escape(atob(full)));
  }
}

// ── URL import (async) ────────────────────────────────
async function importFromURL(){
  // New format: ?d=COMPRESSED
  const params=new URLSearchParams(location.search);
  const encoded=params.get('d');
  if(encoded){
    const last=localStorage.getItem(IK);
    if(last===encoded)return null; // already imported this exact snapshot
    try{
      const json=await decompress(encoded);
      const urlData=JSON.parse(json);
      if(urlData?.hours&&urlData?.history){
        save(urlData);
        localStorage.setItem(IK,encoded);
        history.replaceState(null,'',location.pathname);
        showToast('공유된 데이터를 불러왔습니다.');
        return urlData;
      }
    }catch(e){console.error('import err',e);}
  }
  // Legacy format: #wca=
  const hash=location.hash;
  if(hash.startsWith('#wca=')){
    const enc=hash.slice(5);
    const last=localStorage.getItem(IK);
    if(last===enc)return null;
    try{
      const json=decodeURIComponent(escape(atob(enc)));
      const urlData=JSON.parse(json);
      if(urlData?.hours&&urlData?.history){
        save(urlData);localStorage.setItem(IK,enc);
        history.replaceState(null,'',location.pathname);
        showToast('공유된 데이터를 불러왔습니다.');
        return urlData;
      }
    }catch(e){}
  }
  return null;
}

// ── 월 정산 ───────────────────────────────────────────
function settleMonth(ym){
  const data=load();
  if(!data.settledMonths)data.settledMonths=[];
  if(data.settledMonths.includes(ym)){showToast('이미 정산된 월입니다.');return;}

  const mdata=buildMonthlyData(data.history);
  const md=mdata[ym];
  if(!md)return;

  const[y,mo]=ym.split('-');
  const total=MEMBERS.reduce((s,m)=>s+(md[m]||0),0);
  const avg=total/MEMBERS.length;

  // 정산 미리보기
  const over=MEMBERS.filter(m=>(md[m]||0)>avg+0.05).map(m=>`  ${m}: ${md[m]}h → +${Math.round(md[m]-avg)}h 이월 (초과)`);
  const under=MEMBERS.filter(m=>(md[m]||0)<avg-0.05).map(m=>`  ${m}: ${md[m]}h → ${Math.round(md[m]-avg)}h 이월 (부족)`);
  const even=MEMBERS.filter(m=>Math.abs((md[m]||0)-avg)<=0.05).map(m=>`  ${m}: ${md[m]}h → 0h (평균)`);
  const msg=[
    `${y}년 ${parseInt(mo)}월 정산`,
    `월 평균: ${avg.toFixed(1)}h`,
    '',
    over.length?'▶ 평균 초과 → 다음달 +이월:':'',
    ...over,
    under.length?'▶ 평균 부족 → 다음달 -이월 (더 채워야 함):':'',
    ...under,
    even.length?'▶ 평균 동일 → 0h 리셋:':'',
    ...even,
    '',
    '정산하시겠습니까?'
  ].filter(l=>l!==undefined).join('\n');

  if(!confirm(msg))return;

  const [sy,smo]=ym.split('-');let sny=parseInt(sy),snm=parseInt(smo)+1;
  if(snm>12){snm=1;sny++;}
  const nextYM=`${sny}-${String(snm).padStart(2,'0')}`;
  if(!data.settleAdjustments)data.settleAdjustments={};
  data.settleAdjustments[nextYM]={};
  for(const m of MEMBERS){
    const h=md[m]||0;
    const adj=Math.round(h-avg);
    data.settleAdjustments[nextYM][m]=adj;
    data.hours[m]=Math.round((data.hours[m]||0)+(adj-h));
  }
  data.settledMonths.push(ym);
  save(data);
  rerenderCum(data,null);
  renderTeamChips(null);
  showToast(`${y}년 ${parseInt(mo)}월 정산 완료!`);
}

      <div class="form-group" style="max-width:220px"><label>날짜</label><input type="date" id="fdDate" value="${todayStr}"></div>
      <div style="margin-bottom:10px">
        <div style="font-size:11px;font-weight:700;color:#5a6a7e;margin-bottom:6px;text-transform:uppercase;letter-spacing:.3px">배정 목록</div>
        <div class="tw"><table style="width:100%">
          <thead><tr><th style="width:44%">Family Day</th><th style="width:44%">업무대행자</th><th style="width:12%"></th></tr></thead>
          <tbody id="fdRows"><tr id="fd-empty-row"><td colspan="3" style="text-align:center;color:#94a3b8;padding:14px;font-size:12px">아래 버튼으로 행을 추가하세요</td></tr></tbody>
        </table></div>
      </div>
      <div style="display:flex;gap:8px;margin-top:10px">
        <button class="btn btn-secondary" onclick="addFDRow()" style="font-size:12px;padding:8px 14px">+ 행 추가</button>
        <button class="btn btn-primary" onclick="saveFDEntry()" style="font-size:12px;padding:8px 16px">💾 저장</button>
      </div>
      <div style="margin-top:8px;font-size:11px;color:#94a3b8">※ Family Day 배정은 누적 시간에 포함되지 않습니다</div>
    </div>
    <div style="border-top:2px solid #eef2f7;padding-top:16px">
      <div style="font-size:13px;font-weight:700;color:#1e3a5f;margin-bottom:10px;display:flex;align-items:center;gap:6px"><span class="ctbar"></span>Family Day 이력</div>
      ${histHtml}
    </div>`;
}

function addFDRow(){
  const memberOpts=MEMBERS.map(m=>`<option value="${m}">${m}</option>`).join('');
  const empty=document.getElementById('fd-empty-row');
  if(empty)empty.remove();
  const tr=document.createElement('tr');
  tr.innerHTML=`<td><select><option value="">선택</option>${memberOpts}</select></td>
    <td><select><option value="">선택</option>${memberOpts}</select></td>
    <td style="text-align:center"><button onclick="this.closest('tr').remove()" class="btn btn-del" style="padding:3px 8px;font-size:11px">✕</button></td>`;
  document.getElementById('fdRows').appendChild(tr);
}

function saveFDEntry(){
  const date=document.getElementById('fdDate').value;
  if(!date){showToast('날짜를 선택해주세요.');return;}
  const rows=[];
  document.querySelectorAll('#fdRows tr:not(#fd-empty-row)').forEach(tr=>{
    const sels=tr.querySelectorAll('select');
    if(sels[0]&&sels[0].value)rows.push({absentee:sels[0].value,coverage:sels[1]?sels[1].value:''});
  });
  if(!rows.length){showToast('배정 행을 1개 이상 추가해주세요.');return;}
  const entries=loadFD();
  const editId=document.getElementById('fdEditId').value;
  if(editId){
    const idx=entries.findIndex(e=>e.id===editId);
    if(idx!==-1)entries[idx]={...entries[idx],date,rows};
    saveFD(entries);
    showToast('Family Day 배정이 수정되었습니다.');
  }else{
    entries.push({id:`fd-${date}-${Date.now()}`,date,rows});
    saveFD(entries);
    showToast('Family Day 배정이 저장되었습니다.');
  }
  renderFamilyDay();
}

function editFDEntry(id){
  const entry=loadFD().find(e=>e.id===id);
  if(!entry)return;
  const memberOpts=MEMBERS.map(m=>`<option value="${m}">${m}</option>`).join('');
  document.getElementById('fdEditId').value=id;
  document.getElementById('fdEditBanner').style.display='block';
  document.getElementById('fdDate').value=entry.date;
  const tbody=document.getElementById('fdRows');
  tbody.innerHTML='';
  for(const r of entry.rows){
    const tr=document.createElement('tr');
    tr.innerHTML=`<td><select><option value="">선택</option>${memberOpts}</select></td>
      <td><select><option value="">선택</option>${memberOpts}</select></td>
      <td style="text-align:center"><button onclick="this.closest('tr').remove()" class="btn btn-del" style="padding:3px 8px;font-size:11px">✕</button></td>`;
    const sels=tr.querySelectorAll('select');
    sels[0].value=r.absentee;sels[1].value=r.coverage||'';
    tbody.appendChild(tr);
  }
  document.getElementById('fdContent').scrollIntoView({behavior:'smooth',block:'start'});
  showToast('수정 모드 — 변경 후 저장하세요.');
}

function cancelFDEdit(){renderFamilyDay();}

function copyFDEntry(id){
  const entry=loadFD().find(e=>e.id===id);
  if(!entry)return;
  let text=`🏖 JK기업영업2팀 Family Day 업무대행 - ${fmtDate(entry.date)}\n\n`;
  text+=`Family Day\t\t대행자\n${'─'.repeat(28)}\n`;
  for(const r of entry.rows)text+=`${r.absentee}\t\t${r.coverage||'미배정'}\n`;
  const ok=()=>showToast('슬랙 공유용 텍스트가 복사되었습니다!');
  const fb=()=>{const el=document.createElement('textarea');el.value=text;document.body.appendChild(el);el.select();try{document.execCommand('copy');ok();}catch(e){showToast('복사 실패.');}document.body.removeChild(el);};
  navigator.clipboard?navigator.clipboard.writeText(text).then(ok).catch(fb):fb();
}

function delFDEntry(id){
  if(!confirm('이 Family Day 이력을 삭제하시겠습니까?'))return;
  saveFD(loadFD().filter(e=>e.id!==id));
  renderFamilyDay();
}

// ── Vacation Calendar ─────────────────────────────────
const VT_BG={'연차휴가':'#fff0f0','오전연차':'#eff6ff','오후연차':'#fff7ed','오전반반차':'#f0fdf4','오후반반차':'#f5f3ff','건강검진':'#f0fdfa'};
const VT_TC={'연차휴가':'#b91c1c','오전연차':'#1d4ed8','오후연차':'#c2410c','오전반반차':'#065f46','오후반반차':'#6d28d9','건강검진':'#0f766e'};
const VT_BD={'연차휴가':'#ef4444','오전연차':'#3b82f6','오후연차':'#f97316','오전반반차':'#10b981','오후반반차':'#8b5cf6','건강검진':'#14b8a6'};
const VT_SHORT={'연차휴가':'연차','오전연차':'오전연차','오후연차':'오후연차','오전반반차':'오전반반','오후반반차':'오후반반','건강검진':'건강검진'};
let _vcY,_vcM;

function initVacCal(){
  const t=new Date();_vcY=t.getFullYear();_vcM=t.getMonth();
  renderVacCal();
}

function renderVacCal(){
  const entries=loadVac();
  const byDate={};
  for(const e of entries){if(!byDate[e.date])byDate[e.date]=[];byDate[e.date].push(e);}
  const t=new Date();
  const todayStr=`${t.getFullYear()}-${String(t.getMonth()+1).padStart(2,'0')}-${String(t.getDate()).padStart(2,'0')}`;
  const first=new Date(_vcY,_vcM,1);
  const last=new Date(_vcY,_vcM+1,0);
  const dow0=first.getDay();
  const MN=['1월','2월','3월','4월','5월','6월','7월','8월','9월','10월','11월','12월'];
  const DOW=['일','월','화','수','목','금','토'];
  let g=DOW.map((d,i)=>`<div class="vcal-dow ${i===0?'vdw-sun':i===6?'vdw-sat':'vdw-wd'}">${d}</div>`).join('');
  for(let i=0;i<dow0;i++)g+=`<div class="vcal-cell vcd-blank"></div>`;
  for(let d=1;d<=last.getDate();d++){
    const ds=`${_vcY}-${String(_vcM+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const dw=(dow0+d-1)%7;
    const de=byDate[ds]||[];
    const isFull=de.length>=7;
    const isToday=ds===todayStr;
    let cls='vcal-cell';
    if(isToday)cls+=' vcd-today';else if(dw===0||dw===6)cls+=' vcd-we';
    if(isFull)cls+=' vcd-full';
    const dnCls='vcal-dn '+(isToday?'vdn-today':dw===0?'vdn-sun':dw===6?'vdn-sat':'vdn-wd');
    const erHtml=de.map(e=>`<div class="vcal-er" style="background:${VT_BG[e.leaveType]||'#f8fafc'};border-left-color:${VT_BD[e.leaveType]||'#94a3b8'}">
      <span class="vcal-ename" style="color:${VT_TC[e.leaveType]||'#374151'}">${e.name}</span>
      <span class="vcal-etype" style="color:${VT_TC[e.leaveType]||'#5a6a7e'}">${VT_SHORT[e.leaveType]||e.leaveType}</span>
      <div class="vcal-ebtns">
        <button class="vcal-btn" onclick="openVacEdit('${e.id}')" title="수정">✏</button>
        <button class="vcal-btn" onclick="delVacEntry('${e.id}')" title="삭제" style="color:#dc2626">✕</button>
      </div>
    </div>`).join('');
    const footer=isFull
      ?`<div class="vcal-fulltag">⚠ 7명 마감</div>`
      :`<button class="vcal-addbtn" onclick="openVacAdd('${ds}')">＋ 추가</button>`;
    g+=`<div class="${cls}"><div class="${dnCls}">${d}</div>${erHtml}${footer}</div>`;
  }
  const totalCells=dow0+last.getDate();
  const trail=totalCells%7===0?0:7-totalCells%7;
  for(let i=0;i<trail;i++)g+=`<div class="vcal-cell vcd-blank"></div>`;
  const legend=Object.entries(VT_BD).map(([k,c])=>`<span style="display:inline-flex;align-items:center;gap:4px;margin-right:10px"><span style="display:inline-block;width:8px;height:8px;border-radius:2px;background:${c}"></span><span style="font-size:10px;color:#5a6a7e;font-weight:600">${VT_SHORT[k]||k}</span></span>`).join('');
  document.getElementById('vacContent').innerHTML=`
    <div class="vcal-nav">
      <button class="btn btn-secondary" onclick="moveVacCal(-1)" style="padding:7px 18px;font-weight:700">◀</button>
      <span class="vcal-nav-title">${_vcY}년 ${MN[_vcM]}</span>
      <button class="btn btn-secondary" onclick="moveVacCal(1)" style="padding:7px 18px;font-weight:700">▶</button>
    </div>
    <div class="vcal-wrap"><div class="vcal-grid">${g}</div></div>
    <div style="margin-top:12px;display:flex;flex-wrap:wrap;align-items:center;gap:4px">${legend}</div>
    <div style="margin-top:6px;font-size:11px;color:#94a3b8">날짜 셀의 <strong>＋ 추가</strong> 클릭 · 하루 최대 7명 · 누적 시간 미포함</div>`;
}

function moveVacCal(d){
  _vcM+=d;
  if(_vcM<0){_vcM=11;_vcY--;}
  if(_vcM>11){_vcM=0;_vcY++;}
  renderVacCal();
}

function openVacAdd(date){
  document.getElementById('vacEditId').value='';
  document.getElementById('vacModalTitle').textContent='📅 휴가 입력';
  document.getElementById('vacDateLabel').innerHTML=`📅 날짜: <strong>${fmtDate(date)}</strong>`;
  document.getElementById('vacDateHidden').value=date;
  document.getElementById('vacName').value='';
  document.getElementById('vacType').value='';
  document.getElementById('vacModal').classList.add('open');
}

function openVacEdit(id){
  const e=loadVac().find(e=>e.id===id);if(!e)return;
  document.getElementById('vacEditId').value=id;
  document.getElementById('vacModalTitle').textContent='✏️ 휴가 수정';
  document.getElementById('vacDateLabel').innerHTML=`📅 날짜: <strong>${fmtDate(e.date)}</strong>`;
  document.getElementById('vacDateHidden').value=e.date;
  document.getElementById('vacName').value=e.name;
  document.getElementById('vacType').value=e.leaveType;
  document.getElementById('vacModal').classList.add('open');
}

function closeVacModal(){document.getElementById('vacModal').classList.remove('open');}

function saveVacEntry(){
  const name=document.getElementById('vacName').value;
  const leaveType=document.getElementById('vacType').value;
  const date=document.getElementById('vacDateHidden').value;
  const editId=document.getElementById('vacEditId').value;
  if(!name){showToast('이름을 선택해주세요.');return;}
  if(!leaveType){showToast('휴가 종류를 선택해주세요.');return;}
  const entries=loadVac();
  if(editId){
    const idx=entries.findIndex(e=>e.id===editId);
    if(idx!==-1)entries[idx]={...entries[idx],name,leaveType};
    saveVac(entries);showToast('수정되었습니다.');
  }else{
    if(entries.filter(e=>e.date===date).length>=7){showToast('해당 날짜는 이미 7명이 등록되어 있습니다.');closeVacModal();return;}
    if(entries.some(e=>e.date===date&&e.name===name)){showToast(`${name}님은 이미 해당 날짜에 등록되어 있습니다.`);return;}
    entries.push({id:`vac-${date}-${Date.now()}`,date,name,leaveType});
    saveVac(entries);showToast('휴가가 등록되었습니다.');
  }
  closeVacModal();renderVacCal();
}

function delVacEntry(id){
  if(!confirm('이 휴가 내역을 삭제하시겠습니까?'))return;
  saveVac(loadVac().filter(e=>e.id!==id));
  renderVacCal();
}

// ── Inline Calendar ───────────────────────────────────
let _cy,_cm;
function initCal(){
  const t=new Date();
  _cy=t.getFullYear();_cm=t.getMonth();
  renderCal();
}
function renderCal(){
  const t=new Date();
  const todayStr=`${t.getFullYear()}-${String(t.getMonth()+1).padStart(2,'0')}-${String(t.getDate()).padStart(2,'0')}`;
  const sel=document.getElementById('dateInput').value;
  const first=new Date(_cy,_cm,1);
  const last=new Date(_cy,_cm+1,0);
  const dow0=first.getDay();
  const MN=['1월','2월','3월','4월','5월','6월','7월','8월','9월','10월','11월','12월'];
  const DOW=['일','월','화','수','목','금','토'];
  let g=DOW.map((d,i)=>`<div class="ical-dow" style="${i===0?'color:#e74c3c':i===6?'color:#2e86c1':''}">${d}</div>`).join('');
  for(let i=0;i<dow0;i++)g+=`<div class="ical-d ical-blank"></div>`;
  for(let d=1;d<=last.getDate();d++){
    const ds=`${_cy}-${String(_cm+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const dw=(dow0+d-1)%7;
    let cls='ical-d';
    if(ds===sel)cls+=' ical-sel';
    else if(ds===todayStr)cls+=' ical-today';
    else if(dw===0)cls+=' ical-sun';
    else if(dw===6)cls+=' ical-sat';
    g+=`<div class="${cls}" onclick="selCalDate('${ds}')">${d}</div>`;
  }
  document.getElementById('inlineCal').innerHTML=`<div class="ical">
    <div class="ical-nav">
      <button class="ical-nbtn" onclick="moveCal(-1)">◀</button>
      <span class="ical-title">${_cy}년 ${MN[_cm]}</span>
      <button class="ical-nbtn" onclick="moveCal(1)">▶</button>
    </div>
    <div class="ical-grid">${g}</div>
  </div>`;
}
function moveCal(d){
  _cm+=d;
  if(_cm<0){_cm=11;_cy--;}
  if(_cm>11){_cm=0;_cy++;}
  renderCal();
  renderTeamChips(null);
  if(document.getElementById('tab-cum').classList.contains('active'))rerenderCum(load(),null);
}
function selCalDate(ds){
  document.getElementById('dateInput').value=ds;
  renderCal();
  clearAbsenteeForm();
}

// ── Toast ─────────────────────────────────────────────
let _tt=null;
function showToast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg;t.classList.add('show');
  if(_tt)clearTimeout(_tt);
  _tt=setTimeout(()=>t.classList.remove('show'),2800);
}

// ── Init (async) ──────────────────────────────────────
(async function init(){
  // Firebase 초기화
  if(FB_READY){
    try{
      if(!firebase.apps.length)firebase.initializeApp(FB_CONFIG);
      _db=firebase.database();
      _dataRef=_db.ref('wca_v3');
      _fdRef=_db.ref('wca_fd');
      _vacRef=_db.ref('wca_vac');

      // 최초 데이터 로드 (Firebase → 메모리 캐시)
      await new Promise(resolve=>{
        _dataRef.once('value',snap=>{
          const v=snap.val();
          if(v){_fbCache=v;localStorage.setItem(SK,JSON.stringify(v));}
          resolve();
        }).catch(resolve);
      });

      // 실시간 변경 리스너 (다른 기기 수정 시 자동 반영)
      _dataRef.on('value',snap=>{
        const v=snap.val();if(!v)return;
        const changed=JSON.stringify(v)!==JSON.stringify(_fbCache);
        _fbCache=v;localStorage.setItem(SK,JSON.stringify(v));
        if(changed)_rerenderActive(v);
      });
      _fdRef.on('value',snap=>{const v=snap.val();if(v){localStorage.setItem(FK,JSON.stringify(v));renderFamilyDay();}});
      _vacRef.on('value',snap=>{const v=snap.val();if(v){localStorage.setItem(VK,JSON.stringify(v));}});

      _fbStatus('🟢 실시간 연결됨',true);
    }catch(e){_fbStatus('⚠️ Firebase 오류',false);console.error(e);}
  }else{
    _fbStatus('⚠️ Firebase 미설정 (로컬 모드)',false);
  }

  const urlData=await importFromURL();
  if(urlData)save(urlData); // URL 임포트 시 Firebase에도 반영
  const data=load();

  initCal();
  MEMBERS.forEach(m=>document.getElementById('vacName').innerHTML+=`<option value="${m}">${m}</option>`);
  initVacCal();

  for(let i=1;i<=4;i++){
    const nSel=document.getElementById(`n${i}`);
    MEMBERS.forEach(m=>nSel.innerHTML+=`<option value="${m}">${m}</option>`);
    nSel.addEventListener('change',function(){
      document.getElementById(`t${i}`).disabled=!this.value;
      if(!this.value)document.getElementById(`t${i}`).value='';
      refreshSelects('n');
    });
    document.getElementById(`en${i}`).addEventListener('change',function(){
      document.getElementById(`et${i}`).disabled=!this.value;
      if(!this.value)document.getElementById(`et${i}`).value='';
      refreshSelects('en');
    });
  }

  document.addEventListener('keydown',e=>{if(e.key==='Escape'){closeEditModal();closeShareModal();closeVacModal();}});

  rerenderCum(data,null);
  document.getElementById('histContent').innerHTML=renderHistory(data.history);
  renderFamilyDay();
  renderTeamChips(null);
})();
</script>
